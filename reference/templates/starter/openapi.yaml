openapi: 3.1.0
info:
  title: Starter Template API
  version: 1.0.0
  description: |
    Template app for SaveADay platform development.
    This is a reference implementation for building new apps.
  contact:
    name: SaveADay Support
    url: https://saveaday.ai
    email: support@saveaday.ai

servers:
  - url: https://starter.saveaday.ai
    description: Production server
  - url: http://localhost:3012
    description: Local development server

tags:
  - name: Configuration
    description: App configuration

paths:
  /api/llm-config:
    get:
      tags: [Configuration]
      summary: Get LLM configuration
      description: Retrieve LLM provider configuration for the starter app
      operationId: getLlmConfig
      responses:
        "200":
          description: LLM configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfig"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    LlmConfig:
      type: object
      properties:
        provider:
          type: string
          enum: [openai, anthropic, google]
        model:
          type: string
        apiKey:
          type: string

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
